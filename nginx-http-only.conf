# Use when TLS is terminated at an external load balancer (e.g. OCI LB with ACM).
# Set GATEWAY_HTTPS=0 to use this config.
events {
    worker_connections 1024;
}

http {
    resolver ${NGINX_RESOLVER} valid=10s;
    resolver_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $path $backend_path {
        default $path;
        ""      "/";
    }

    map $http_referer $hash_from_referer {
        default "";
        "~^https?://[^/]+/([a-z0-9-]+)" $1;
    }

    map $http_referer $port_from_referer {
        default "5000";
        "~^https?://[^/]+/[a-z0-9-]+/proxy/([0-9]+)" $1;
    }

    server {
        listen 80;
        server_name _;

        location = / {
            default_type text/plain;
            return 200 "Gateway OK\n";
        }

        # /proxy/<port>/... - port in request path, use it; hash from Referer
        location ~ ^/proxy/([0-9]+)(/.*)?$ {
            if ($hash_from_referer = "") {
                return 403 "Referer must include workspace hash";
            }
            set $backend "${hash_from_referer}.${NGINX_WORKSPACE_DOMAIN}:80";
            proxy_pass http://$backend$request_uri$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # No port in path - use Referer proxy port (e.g. /health, /api/*)
        location ~ ^/(health|api)(/.*)?$ {
            if ($hash_from_referer = "") {
                return 403 "Referer must include workspace hash";
            }
            set $backend "${hash_from_referer}.${NGINX_WORKSPACE_DOMAIN}:80";
            rewrite ^ /proxy/$port_from_referer$request_uri break;
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # /<hash> without trailing slash -> redirect to /<hash>/ (fixes code-server ./ redirect)
        location ~ ^/(?<hash>[a-z0-9-]+)$ {
            return 301 /$hash/$is_args$args;
        }

        # /<hash>/starter-template
        location ~ ^/(?<hash>[a-z0-9-]+)/starter-template/?$ {
            root /usr/share/nginx/html;
            try_files /starter-template.html =404;
        }

        location ~ ^/(?<hash>[a-z0-9-]+)(?<path>/.*)?$ {
            set $backend "${hash}.${NGINX_WORKSPACE_DOMAIN}:80";
            proxy_pass http://$backend$backend_path$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_redirect ~^https?://[^/]+/?(.*)$ /$hash/$1;
            proxy_redirect ~^/(.*)$ /$hash/$1;
        }
    }
}
