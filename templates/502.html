<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eightfold-editor</title>
  <link rel="stylesheet" href="https://unpkg.com/@eightfold.ai/octuple@2.57.2/dist/index.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React from 'https://esm.sh/react@18';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import { Empty, EmptyMode } from 'https://esm.sh/@eightfold.ai/octuple@2.57.2?deps=react@18,react-dom@18';

    const root = createRoot(document.getElementById('root'));
    root.render(
      React.createElement(Empty, {
        mode: EmptyMode.error,
        description: 'Editor will be available after meeting starts',
      })
    );
  </script>
</body>
</html>
