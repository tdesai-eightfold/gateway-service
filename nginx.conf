events {
    worker_connections 1024;
}

http {
    resolver ${NGINX_RESOLVER} valid=10s;
    resolver_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $path $backend_path {
        default $path;
        ""      "/";
    }

    # Extract hash from Referer (e.g. https://host/abc123/proxy/5000/)
    map $http_referer $hash_from_referer {
        default "";
        "~^https?://[^/]+/([a-z0-9]+)" $1;
    }

    # Port from Referer when no port in request
    map $http_referer $port_from_referer {
        default "5000";
        "~^https?://[^/]+/[a-z0-9]+/proxy/([0-9]+)" $1;
    }

    # HTTP server - redirect to HTTPS when HTTPS is enabled
    server {
        listen 80;
        server_name _;
        # Redirect HTTP to HTTPS (browsers need HTTPS for crypto.subtle / secure context)
        return 301 https://$host$request_uri;
    }

    # HTTPS server - main gateway
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        # Health check / test (no hash required)
        location = / {
            default_type text/plain;
            return 200 "Gateway OK\n";
        }

        # /proxy/<port>/... - port in request path, use it; hash from Referer
        location ~ ^/proxy/([0-9]+)(/.*)?$ {
            if ($hash_from_referer = "") {
                return 403 "Referer must include workspace hash";
            }
            set $backend "${hash_from_referer}.${NGINX_WORKSPACE_DOMAIN}:80";
            proxy_pass http://$backend$request_uri$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # No port in path - use Referer proxy port (e.g. /health, /api/*)
        location ~ ^/(health|api)(/.*)?$ {
            if ($hash_from_referer = "") {
                return 403 "Referer must include workspace hash";
            }
            set $backend "${hash_from_referer}.${NGINX_WORKSPACE_DOMAIN}:80";
            rewrite ^ /proxy/$port_from_referer$request_uri break;
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # /<hash>/starter-template
        location ~ ^/(?<hash>[a-z0-9]+)/starter-template/?$ {
            root /usr/share/nginx/html;
            try_files /starter-template.html =404;
        }

        # /<hash> or /<hash>/path
        location ~ ^/(?<hash>[a-z0-9]+)(?<path>/.*)?$ {
            set $backend "${hash}.${NGINX_WORKSPACE_DOMAIN}:80";
            proxy_pass http://$backend$backend_path$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_redirect ~^https?://[^/]+/?(.*)$ /$hash/$1;
            proxy_redirect ~^/(.*)$ /$hash/$1;
        }
    }
}
