events {
    worker_connections 1024;
}

http {
    resolver 10.0.0.2 valid=2s ipv4=on;
    resolver_timeout 3s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $path $backend_path {
        default $path;
        ""      "/";
    }

    # Extract hash from Referer (e.g. https://host/abc123/proxy/5000/)
    map $http_referer $hash_from_referer {
        default "";
        "~^https?://[^/]+/([a-z0-9]+)" $1;
    }

    # Port from Referer when no port in request
    map $http_referer $port_from_referer {
        default "5000";
        "~^https?://[^/]+/[a-z0-9]+/proxy/([0-9]+)" $1;
    }

    # 1 only when Referer contains /<hash>/proxy/<port>/ — used to gate proxy referer routing
    map $http_referer $referer_has_proxy {
        default 0;
        "~^https?://[^/]+/[a-z0-9]+/proxy/[0-9]+" 1;
    }

    # HTTPS server - main gateway (HTTPS only, no HTTP listener)
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        # Health check / test (no hash required)
        location = / {
            default_type text/plain;
            return 200 "Gateway OK\n";
        }

        # /proxy/<port>/... - port in request path, use it; hash from Referer
        location ~ ^/proxy/([0-9]+)(/.*)?$ {
            if ($hash_from_referer = "") {
                return 403 "Referer must include workspace hash and proxy port";
            }
            set $backend "${hash_from_referer}.air-code-editor-private-dns-zone:8080";
            proxy_pass http://$backend$request_uri$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # No port in path - use Referer proxy port (e.g. /health, /api/*)
        location ~ ^/(health|api)(/.*)?$ {
            if ($referer_has_proxy != "1") {
                return 403 "Referer must include workspace hash and proxy port";
            }
            set $backend "${hash_from_referer}.air-code-editor-private-dns-zone:8080";
            rewrite ^ /proxy/$port_from_referer$request_uri break;
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # /<hash> without trailing slash -> redirect to /<hash>/ (fixes code-server ./ redirect)
        location ~ ^/(?<hash>[a-z0-9-]+)$ {
            return 301 /$hash/$is_args$args;
        }

        error_page 502 503 504 /502.html;
        location = /502.html {
            root /usr/share/nginx/html;
            internal;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # Requests whose Referer is /<hash>/proxy/<port>/ — forward using referer's hash+port
        location @proxy_referer_route {
            set $backend "${hash_from_referer}.air-code-editor-private-dns-zone:8080";
            proxy_pass http://$backend/proxy/$port_from_referer$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # /<hash> or /<hash>/path
        location ~ ^/(?<hash>[a-z0-9-]+)(?<path>/.*)?$ {
            # If Referer is /<hash>/proxy/<port>/, route via that proxy path instead —
            # but only when the URL hash differs from the referer hash.
            # If the URL already carries the same hash, serve it directly (no path change).
            error_page 418 = @proxy_referer_route;
            set $route_via_referer $referer_has_proxy;
            if ($hash = $hash_from_referer) {
                set $route_via_referer "0";
            }
            if ($route_via_referer = "1") {
                return 418;
            }
            set $backend "${hash}.air-code-editor-private-dns-zone:8080";
            proxy_pass http://$backend$backend_path$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 3s;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_redirect ~^https?://[^/]+/?(.*)$ /$hash/$1;
            proxy_redirect ~^/(.*)$ /$hash/$1;
        }
    }
}
